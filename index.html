<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>소원주점 — 육효 점사</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- React 18 CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (JSX 변환) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ▼▼▼ Firebase CDN (compat 버전 — 순서 중요) ▼▼▼ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <!-- ▲▲▲ Firebase CDN 끝 ▲▲▲ -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0E0709;
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; }

    /* 스크롤바 숨김 */
    ::-webkit-scrollbar { width: 0; background: transparent; }

    /* 입력 요소 기본 스타일 초기화 */
    input, textarea, button, select {
      font-family: 'Noto Serif KR', serif;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 소원주점 앱 -->
  <script type="text/babel" src="소원주점_v12.jsx" data-presets="react"></script>

  <script>
    // Babel 변환 완료 후 React 앱 마운트
    window.addEventListener('load', () => {
      // 이미 babel이 자동으로 처리하므로 별도 마운트 불필요
      // (SplashSandae 컴포넌트가 export default로 마운트됨)
    });
  </script>
</body>
</html>
